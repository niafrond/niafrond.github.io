<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>QR Scanner</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#22d3ee">
<style>
:root {
  --bg: #0f172a;
  --surface: #1e293b;
  --surface2: #334155;
  --accent: #22d3ee;
  --accent2: #0891b2;
  --text: #f1f5f9;
  --muted: #94a3b8;
  --success: #4ade80;
  --danger: #f87171;
  --radius: 14px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: system-ui, -apple-system, sans-serif;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
}

header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--surface2);
}

header h1 {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--accent);
  display: flex;
  align-items: center;
  gap: 8px;
}

#flipBtn {
  background: var(--surface2);
  border: none;
  color: var(--text);
  border-radius: 50%;
  width: 40px;
  height: 40px;
  font-size: 1.2rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s;
}
#flipBtn:active { background: var(--accent2); }

/* ── scanner section ── */
#scanner-wrap {
  position: relative;
  width: 100%;
  background: black;
  overflow: hidden;
  flex-shrink: 0;
}

#video {
  width: 100%;
  display: block;
  max-height: 60dvh;
  object-fit: cover;
}

#overlay {
  position: absolute;
  inset: 0;
  pointer-events: none;
}

/* scanning frame */
.frame {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: min(280px, 70vw);
  height: min(280px, 70vw);
}
.frame::before,
.frame::after,
.frame-bl,
.frame-br {
  content: '';
  position: absolute;
  width: 28px;
  height: 28px;
  border-color: var(--accent);
  border-style: solid;
  opacity: 0.9;
}
.frame::before  { top: 0; left: 0;  border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
.frame::after   { top: 0; right: 0; border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
.frame-bl       { bottom: 0; left: 0;  border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }
.frame-br       { bottom: 0; right: 0; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }

#scan-line {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: min(280px, 70vw);
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  animation: scan 2s ease-in-out infinite;
}

@keyframes scan {
  0%   { margin-top: calc(min(-140px, -35vw)); }
  50%  { margin-top: calc(min(140px, 35vw)); }
  100% { margin-top: calc(min(-140px, -35vw)); }
}

/* detected highlight */
#detected-box {
  position: absolute;
  border: 3px solid var(--success);
  border-radius: 6px;
  transition: all 0.1s;
  display: none;
  box-shadow: 0 0 16px rgba(74,222,128,0.5);
}

#status-bar {
  position: absolute;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.7);
  color: var(--muted);
  font-size: 0.75rem;
  padding: 4px 12px;
  border-radius: 20px;
  white-space: nowrap;
}

/* ── result banner ── */
#result-banner {
  background: var(--surface);
  border-top: 2px solid var(--accent);
  padding: 12px 16px;
  display: none;
  gap: 10px;
  align-items: flex-start;
}
#result-banner.show { display: flex; }

#result-text {
  flex: 1;
  font-size: 0.9rem;
  word-break: break-all;
  color: var(--text);
  line-height: 1.4;
}

.result-actions {
  display: flex;
  flex-direction: column;
  gap: 6px;
  flex-shrink: 0;
}

.action-btn {
  background: var(--surface2);
  border: none;
  color: var(--text);
  border-radius: 8px;
  padding: 6px 12px;
  font-size: 0.8rem;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.2s;
}
.action-btn:active { background: var(--accent2); }

/* ── error screen ── */
#error-screen {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  padding: 32px;
  text-align: center;
  flex: 1;
}
#error-screen.show { display: flex; }

#error-icon { font-size: 3rem; }
#error-msg { color: var(--muted); font-size: 0.9rem; line-height: 1.6; }
#retryBtn {
  background: var(--accent);
  color: #0f172a;
  border: none;
  border-radius: 10px;
  padding: 10px 24px;
  font-size: 0.95rem;
  font-weight: 700;
  cursor: pointer;
}

/* ── toast ── */
#toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--surface2);
  color: var(--text);
  padding: 10px 20px;
  border-radius: 20px;
  font-size: 0.85rem;
  transition: transform 0.3s ease;
  pointer-events: none;
  z-index: 100;
  white-space: nowrap;
}
#toast.show { transform: translateX(-50%) translateY(0); }

canvas { display: none; }
</style>
</head>
<body>

<header>
  <h1>📷 QR Scanner</h1>
  <button id="flipBtn" title="Retourner la caméra">🔄</button>
</header>

<div id="scanner-wrap">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
  <div id="overlay">
    <div class="frame">
      <div class="frame-bl"></div>
      <div class="frame-br"></div>
    </div>
    <div id="scan-line"></div>
    <div id="detected-box"></div>
  </div>
  <div id="status-bar">Initialisation…</div>
</div>

<div id="result-banner">
  <div id="result-text"></div>
  <div class="result-actions">
    <button class="action-btn" id="copyResultBtn">Copier</button>
  </div>
</div>

<div id="error-screen">
  <div id="error-icon">📵</div>
  <p id="error-msg"></p>
  <button id="retryBtn">Réessayer</button>
</div>

<div id="toast"></div>

<script src="jsqr.js"></script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js')
}

// ── state ──────────────────────────────────────────────────
let stream = null
let facingMode = localStorage.getItem('qrscanner-facing') || 'environment'
let scanning = true
let lastCode = null
let lastCodeTime = 0
const COOLDOWN = 2000  // ms before same code triggers again
let animFrame = null

// ── elements ───────────────────────────────────────────────
const video        = document.getElementById('video')
const canvas       = document.getElementById('canvas')
const ctx          = canvas.getContext('2d', { willReadFrequently: true })
const statusBar    = document.getElementById('status-bar')
const detectedBox  = document.getElementById('detected-box')
const resultBanner = document.getElementById('result-banner')
const resultText   = document.getElementById('result-text')
const copyResultBtn= document.getElementById('copyResultBtn')
const errorScreen  = document.getElementById('error-screen')
const errorMsg     = document.getElementById('error-msg')
const retryBtn     = document.getElementById('retryBtn')
const flipBtn      = document.getElementById('flipBtn')
const toast        = document.getElementById('toast')

// ── camera ─────────────────────────────────────────────────
async function startCamera() {
  errorScreen.classList.remove('show')
  statusBar.textContent = 'Démarrage caméra…'

  if (stream) {
    stream.getTracks().forEach(t => t.stop())
    stream = null
  }

  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode,
        width: { ideal: 1280 },
        height: { ideal: 720 }
      },
      audio: false
    })
    video.srcObject = stream
    await video.play()
    statusBar.textContent = 'Pointez un QR code'
    scanning = true
    scan()
  } catch (err) {
    showError(err)
  }
}

function showError(err) {
  if (animFrame) cancelAnimationFrame(animFrame)
  scanning = false
  let msg = 'Impossible d\'accéder à la caméra.'
  if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
    msg = 'Accès à la caméra refusé.\nVeuillez autoriser la caméra dans les paramètres du navigateur et réessayer.'
  } else if (err.name === 'NotFoundError') {
    msg = 'Aucune caméra trouvée sur cet appareil.'
  } else if (err.name === 'NotReadableError') {
    msg = 'La caméra est déjà utilisée par une autre application.'
  } else if (err.name === 'OverconstrainedError') {
    msg = 'La caméra demandée n\'est pas disponible. Essayez de retourner la caméra.'
  }
  errorMsg.textContent = msg
  errorScreen.classList.add('show')
  statusBar.textContent = 'Erreur caméra'
}

// ── QR scanning loop ───────────────────────────────────────
function scan() {
  if (!scanning) return
  if (video.readyState === video.HAVE_ENOUGH_DATA) {
    canvas.width  = video.videoWidth
    canvas.height = video.videoHeight
    ctx.drawImage(video, 0, 0)
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height)
    const code = jsQR(imageData.data, imageData.width, imageData.height, {
      inversionAttempts: 'dontInvert'
    })
    if (code) {
      onCodeFound(code)
    } else {
      detectedBox.style.display = 'none'
    }
  }
  animFrame = requestAnimationFrame(scan)
}

function onCodeFound(code) {
  const now = Date.now()
  const isNew = code.data !== lastCode || (now - lastCodeTime) > COOLDOWN

  // Draw highlight box on video overlay
  const vw = video.offsetWidth
  const vh = video.offsetHeight
  const scaleX = vw / canvas.width
  const scaleY = vh / canvas.height
  const pts = code.location
  const xs = [pts.topLeftCorner.x, pts.topRightCorner.x, pts.bottomRightCorner.x, pts.bottomLeftCorner.x]
  const ys = [pts.topLeftCorner.y, pts.topRightCorner.y, pts.bottomRightCorner.y, pts.bottomLeftCorner.y]
  const x1 = Math.min(...xs) * scaleX
  const y1 = Math.min(...ys) * scaleY
  const x2 = Math.max(...xs) * scaleX
  const y2 = Math.max(...ys) * scaleY

  detectedBox.style.display = 'block'
  detectedBox.style.left   = x1 + 'px'
  detectedBox.style.top    = y1 + 'px'
  detectedBox.style.width  = (x2 - x1) + 'px'
  detectedBox.style.height = (y2 - y1) + 'px'

  if (isNew) {
    lastCode = code.data
    lastCodeTime = now
    showResult(code.data)
    statusBar.textContent = '✅ QR détecté !'
    vibrate()
  }
}

function vibrate() {
  if ('vibrate' in navigator) navigator.vibrate(60)
}

// ── result banner ──────────────────────────────────────────
function showResult(value) {
  const isUrl = isURL(value)

  if (isUrl) {
    if (confirm('Ouvrir ce lien ?\n\n' + value)) {
      window.open(value, '_blank', 'noopener,noreferrer')
    }
    return
  }

  resultBanner.classList.add('show')
  resultText.textContent = value
  copyResultBtn.onclick = () => copyText(value)
}

// ── utils ──────────────────────────────────────────────────
function isURL(str) {
  try {
    const u = new URL(str)
    return u.protocol === 'http:' || u.protocol === 'https:'
  } catch { return false }
}

function copyText(text) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => showToast('Copié !')).catch(() => fallbackCopy(text))
  } else {
    fallbackCopy(text)
  }
}

function fallbackCopy(text) {
  const el = document.createElement('textarea')
  el.value = text
  el.style.position = 'fixed'
  el.style.opacity = '0'
  document.body.appendChild(el)
  el.select()
  document.execCommand('copy')
  document.body.removeChild(el)
  showToast('Copié !')
}

let toastTimer = null
function showToast(msg) {
  toast.textContent = msg
  toast.classList.add('show')
  if (toastTimer) clearTimeout(toastTimer)
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2000)
}

// ── events ─────────────────────────────────────────────────
flipBtn.addEventListener('click', () => {
  facingMode = facingMode === 'environment' ? 'user' : 'environment'
  localStorage.setItem('qrscanner-facing', facingMode)
  startCamera()
})

retryBtn.addEventListener('click', startCamera)

// ── init ───────────────────────────────────────────────────
startCamera()
</script>
</body>
</html>
