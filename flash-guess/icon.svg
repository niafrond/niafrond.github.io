<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="bg" cx="45%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1a3a55"/>
      <stop offset="100%" stop-color="#0b1e2d"/>
    </radialGradient>
    <linearGradient id="bolt" x1="58" y1="12" x2="44" y2="88" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fef08a"/>
      <stop offset="45%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#e85d04"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-20%" width="180%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <!-- Warm glow halo behind bolt -->
  <ellipse cx="50" cy="50" rx="28" ry="34" fill="#f59e0b" opacity="0.13"/>
  <!-- Lightning bolt — centered at (50,50): x 36–64, y 12–88 -->
  <path d="M58,12 L36,52 H52 L44,88 L64,48 H48 Z" fill="url(#bolt)" filter="url(#glow)"/>
  <!-- Colorful accent dots (four corners) -->
  <circle cx="21" cy="20" r="3.5" fill="#0096c7" opacity="0.9"/>
  <circle cx="81" cy="18" r="2.5" fill="#fef08a" opacity="0.85"/>
  <circle cx="79" cy="81" r="3.5" fill="#2d9c6e" opacity="0.9"/>
  <circle cx="19" cy="79" r="2.5" fill="#e85d04" opacity="0.85"/>
  <!-- Sparkle crosses (top-left and bottom-right) -->
  <line x1="12" y1="36" x2="18" y2="36" stroke="#0096c7" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="15" y1="33" x2="15" y2="39" stroke="#0096c7" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="82" y1="64" x2="88" y2="64" stroke="#2d9c6e" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="85" y1="61" x2="85" y2="67" stroke="#2d9c6e" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
</svg>
