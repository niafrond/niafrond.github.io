<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

<title>Switch Enfants</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4CAF50">

<style>

:root{
--bg:#0f0f0f;
--card:#1c1c1c;
--accent:#4CAF50;
}

body{
margin:0;
background:var(--bg);
color:white;
font-family:system-ui;
display:flex;
flex-direction:column;
height:100vh;
}

#main{
padding:16px;
display:flex;
flex-direction:column;
gap:12px;
}

#toggleBtn{
width:100%;
height:32vh;
font-size:102px;
font-weight:700;
border:none;
border-radius:24px;
background:var(--accent);
color:white;
}

#info{
text-align:center;
font-size:14px;
opacity:0.8;
}

#history{
margin-top:10px;
display:flex;
flex-direction:column;
gap:10px;
}

.entry{
background:var(--card);
border-radius:14px;
padding:10px;
display:flex;
gap:10px;
align-items:center;
}

.entry img{
width:70px;
height:70px;
object-fit:cover;
border-radius:10px;
}

video,canvas{
display:none;
}

#clearBtn{
width:100%;
padding:8px;
margin-top:auto;
font-size:12px;
border:none;
border-radius:8px;
background:transparent;
color:rgba(255,255,255,0.5);
cursor:pointer;
transition:color 0.2s;
}

#clearBtn:hover{
color:rgba(255,255,255,0.8);
}

.version-badge{
position:fixed;
right:16px;
bottom:16px;
z-index:940;
padding:8px 12px;
border:1px solid rgba(255,255,255,0.1);
border-radius:999px;
background:rgba(15,52,96,0.86);
color:rgba(148,163,184,1);
font-size:0.82rem;
line-height:1;
backdrop-filter:blur(8px);
box-shadow:0 10px 24px rgba(0,0,0,0.18);
}

</style>

</head>
<body>

<div id="main">

<button id="toggleBtn">...</button>

<div id="info"></div>

<div id="history"></div>

<button id="clearBtn">Clear</button>

</div>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<script>

if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('sw.js')
}

const btn = document.getElementById('toggleBtn')
const info = document.getElementById('info')
const historyDiv = document.getElementById('history')
const clearBtn = document.getElementById('clearBtn')

const video = document.getElementById('video')
const canvas = document.getElementById('canvas')

const children = ["Ethan", "Luna"]
let currentChild = localStorage.getItem('currentChild') || children[0]
let lastSwitch = localStorage.getItem('lastSwitch')

let history = JSON.parse(localStorage.getItem('switchHistory') || '[]')
// ensure history stores at most 7 entries
if (history.length > 7) {
  history = history.slice(-7)
  localStorage.setItem('switchHistory', JSON.stringify(history))
}

function updateUI(){

btn.textContent = currentChild

// color code based on child
if (currentChild === 'Luna') {
  btn.style.background = 'purple'
} else if (currentChild === 'Ethan') {
  btn.style.background = '#2192c7'
} else {
  btn.style.background = '' // fallback to default
}

info.textContent =
lastSwitch ?
"Dernier switch : " + new Date(lastSwitch).toLocaleString()
:
"Aucun switch"

}

function renderHistory(){

historyDiv.innerHTML = ""

history.slice().reverse().forEach(entry=>{

const el = document.createElement("div")
el.className="entry"

const img = document.createElement("img")
img.src = entry.photo

const text = document.createElement("div")

text.innerHTML =
"<strong>"+entry.child+"</strong><br>"+
new Date(entry.date).toLocaleString()

el.appendChild(img)
el.appendChild(text)

historyDiv.appendChild(el)

})

}

async function initCamera(){

const stream = await navigator.mediaDevices.getUserMedia({
video:{facingMode:"user"}
})

video.srcObject = stream

}

function takePhoto(){

const ctx = canvas.getContext("2d")

canvas.width = video.videoWidth
canvas.height = video.videoHeight

ctx.drawImage(video,0,0)

return canvas.toDataURL("image/jpeg",0.8)

}

btn.onclick = ()=>{

const photo = takePhoto()

const currentIndex = children.indexOf(currentChild)
currentChild = children[(currentIndex + 1) % children.length]

const now = new Date().toISOString()

const entry={
child:currentChild,
date:now,
photo:photo
}

history.push(entry)

// keep only last 7 entries
if (history.length > 7) {
  history = history.slice(-7)
}

localStorage.setItem("switchHistory",JSON.stringify(history))
localStorage.setItem("currentChild",currentChild)
localStorage.setItem("lastSwitch",now)

lastSwitch = now

updateUI()
renderHistory()

}

clearBtn.onclick = ()=>{
if(confirm("Effacer tout l'historique ?")){
history = []
localStorage.removeItem("switchHistory")
renderHistory()
}
}

updateUI()
renderHistory()
initCamera()

</script>

<div id="lavevaisselle-version" class="version-badge" aria-label="Version de l'application"></div>
<script type="module">
  import { getMatch3Version } from '../match3-quest/version.js';
  const versionEl = document.getElementById('lavevaisselle-version');
  if (versionEl) versionEl.textContent = `v${getMatch3Version()}`;
</script>

</body>
</html>
